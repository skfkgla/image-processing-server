services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: imageprocessing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: imageprocessing
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      MOCK_WORKER_API_KEY: ${MOCK_WORKER_API_KEY}
    depends_on:
      db:
        condition: service_healthy
